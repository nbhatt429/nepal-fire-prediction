name: Daily Nepal Fire Prediction

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install xgboost scikit-learn pandas numpy requests matplotlib

      - name: Run prediction
        run: python predict.py

      - name: Commit CSV to repository
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          ls -la fire_risk_*.csv || echo "No CSV files found"
          git status
          git add -f fire_risk_*.csv || true
          git add -f fire_risk_map_*.png || true
          git status
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily prediction $(date +'%Y-%m-%d')"
          git push origin main || echo "Push failed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: fire-risk-outputs
          path: |
            fire_risk_*.csv
            fire_risk_map_*.png
          retention-days: 30
