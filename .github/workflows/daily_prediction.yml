name: Daily Nepal Fire Prediction

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install xgboost pandas numpy requests matplotlib

        - name: List files
        run: ls -la

      - name: Run prediction
        run: python predict.py

      - name: Run prediction
        run: python predict.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: fire-risk-outputs
          path: |
            fire_risk_map_*.png
            fire_risk_*.csv
          retention-days: 30
