name: Daily Nepal Fire Risk Prediction

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install onnxruntime \
                      scikit-learn joblib \
                      requests numpy pandas matplotlib

      - name: Run prediction
        run: python predict.py

     - name: Commit and push results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add fire_risk_*.csv fire_risk_map_*.png \
                  fire_alert_*.json
          git diff --staged --quiet || git commit \
            -m "Fire risk update $(date +'%Y-%m-%d') — Transformer ONNX AUC=0.9983"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/nbhatt429/nepal-fire-prediction.git
